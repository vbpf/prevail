#
# Exercises `cmake --install` + a consumer `find_package(prevail)` on all three OSes,
# so export/packaging regressions fail a check.
---
name: Test Installation

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-installation-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-install:
    name: Test Install on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      # prevail's build needs Boost headers (SetupBoostHeaders provisions them via NuGet
      # on Windows, but Linux/macOS runners need them installed explicitly).
      - name: Install Boost (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-dev libboost-filesystem-dev libboost-program-options-dev

      - name: Install Boost (macOS)
        if: runner.os == 'macOS'
        run: brew install boost

      - name: Run Installation Test (Bash)
        if: runner.os != 'Windows'
        run: |
          chmod +x scripts/test_install.sh
          ./scripts/test_install.sh

      - name: Run Installation Test (PowerShell)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\scripts\test_install.ps1

      - name: Upload installation artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-failure-${{ matrix.os }}
          path: |
            test_install_output/
            build_install_test/CMakeFiles/CMakeError.log
            build_install_test/CMakeFiles/CMakeOutput.log
