#
# Regression tests for writes through a context pointer.
#
# The context descriptor used by the YAML test harness is {size=64, data=0,
# end=4, meta=-1}: the data and data_end pointer slots occupy bytes [0,4) and
# [4,8). A *load* of those slots synthesizes a typed packet pointer
# (do_load_ctx), but writes are not tracked by the abstract transformer. A write
# to e.g. ctx->data that is accepted as a silent no-op, followed by a reload,
# would hand the program a fresh "valid" packet pointer for a field it corrupted
# at runtime -- a false PASS for an out-of-bounds dereference. Writes that may
# overlap a pointer slot must therefore be rejected, regardless of the stored
# value. Writes to other (scalar) context fields remain allowed.
---
test-case: store number to ctx data pointer slot is rejected

pre: ["r1.type=ctx", "r1.ctx_offset=0",
      "r2.type=number", "r2.svalue=0", "r2.uvalue=0"]

code:
  <start>: |
    *(u32 *)(r1 + 0) = r2

post:
  - "_|_"

messages:
  - "0: Cannot write to context pointer field (valid_access(r1.offset, width=4) for write)"

---
test-case: store number to ctx data_end pointer slot is rejected

pre: ["r1.type=ctx", "r1.ctx_offset=0",
      "r2.type=number", "r2.svalue=0", "r2.uvalue=0"]

code:
  <start>: |
    *(u32 *)(r1 + 4) = r2

post:
  - "_|_"

messages:
  - "0: Cannot write to context pointer field (valid_access(r1.offset+4, width=4) for write)"

---
# A wide store starting before a pointer slot still overlaps it and must be rejected.
test-case: store overlapping ctx data pointer slot is rejected

pre: ["r1.type=ctx", "r1.ctx_offset=0",
      "r2.type=number", "r2.svalue=0", "r2.uvalue=0"]

code:
  <start>: |
    *(u64 *)(r1 + 0) = r2

post:
  - "_|_"

messages:
  - "0: Cannot write to context pointer field (valid_access(r1.offset, width=8) for write)"

---
# Full exploit shape: overwrite ctx->data, reload it as a packet pointer, then
# dereference. Verification must stop at the write rather than reporting PASS.
test-case: overwrite ctx data then reload and deref is rejected

pre: ["r1.type=ctx", "r1.ctx_offset=0",
      "r2.type=number", "r2.svalue=0", "r2.uvalue=0"]

code:
  <start>: |
    *(u32 *)(r1 + 0) = r2
    r3 = *(u32 *)(r1 + 0)
    r4 = *(u8 *)(r3 + 0)

post:
  - "_|_"

messages:
  - "0: Cannot write to context pointer field (valid_access(r1.offset, width=4) for write)"

---
# An atomic read-modify-write also modifies the field and must be rejected on a
# pointer slot, even with a number value register (the value-type check alone
# would let it through).
test-case: atomic to ctx data pointer slot is rejected

pre: ["r1.type=ctx", "r1.ctx_offset=0",
      "r5.type=number", "r5.svalue=1", "r5.uvalue=1"]

code:
  <start>: |
    lock *(u64 *)(r1 + 0) += r5

post:
  - "_|_"

messages:
  - "0: Cannot write to context pointer field (valid_access(r1.offset, width=8) for write)"

---
# Writes to scalar context fields (outside any pointer slot) remain allowed.
test-case: store number to ctx scalar field is allowed

pre: ["r1.type=ctx", "r1.ctx_offset=0",
      "r2.type=number", "r2.svalue=0", "r2.uvalue=0"]

code:
  <start>: |
    *(u32 *)(r1 + 8) = r2
    r0 = 0
    exit

post:
  - r0.svalue=0
  - r0.type=number
  - r0.uvalue=0
  - r1.ctx_offset=0
  - r1.type=ctx
  - r2.svalue=0
  - r2.type=number
  - r2.uvalue=0

---
# A load of an inline ctx field (outside the data/data_end/meta slots) is a
# scalar load, narrowed to the range implied by the load width.
test-case: load u8 from ctx inline field narrows to byte range

pre: ["r1.type=ctx", "r1.ctx_offset=0"]

code:
  <start>: |
    r2 = *(u8 *)(r1 + 8)

post:
  - r1.ctx_offset=0
  - r1.type=ctx
  - r2.type=number
  - r2.svalue=[0, 255]
  - r2.uvalue=[0, 255]

---
test-case: load u16 from ctx inline field narrows to half-word range

pre: ["r1.type=ctx", "r1.ctx_offset=0"]

code:
  <start>: |
    r2 = *(u16 *)(r1 + 8)

post:
  - r1.ctx_offset=0
  - r1.type=ctx
  - r2.type=number
  - r2.svalue=[0, 65535]
  - r2.uvalue=[0, 65535]

---
# Width-4 zero-extending loads are intentionally not narrowed, matching
# do_load_packet_or_shared which only narrows zero-extended loads of width 1 or 2.
test-case: load u32 from ctx inline field leaves value unconstrained

pre: ["r1.type=ctx", "r1.ctx_offset=0"]

code:
  <start>: |
    r2 = *(u32 *)(r1 + 8)

post:
  - r1.ctx_offset=0
  - r1.type=ctx
  - r2.type=number

---
# A full 8-byte load is also not narrowed (it would be a no-op tautology).
test-case: load u64 from ctx inline field leaves value unconstrained

pre: ["r1.type=ctx", "r1.ctx_offset=0"]

code:
  <start>: |
    r2 = *(u64 *)(r1 + 8)

post:
  - r1.ctx_offset=0
  - r1.type=ctx
  - r2.type=number

---
# Sign-extending load: svalue narrows to the signed-byte range, but uvalue is
# havoced (left absent below) since a negative result's unsigned 64-bit view is
# not a single interval.
test-case: load s8 from ctx inline field narrows svalue to signed-byte range

pre: ["r1.type=ctx", "r1.ctx_offset=0"]

code:
  <start>: |
    r2 = *(s8 *)(r1 + 8)

post:
  - r1.ctx_offset=0
  - r1.type=ctx
  - r2.type=number
  - r2.svalue=[-128, 127]

---
test-case: load s16 from ctx inline field narrows svalue to signed-half-word range

pre: ["r1.type=ctx", "r1.ctx_offset=0"]

code:
  <start>: |
    r2 = *(s16 *)(r1 + 8)

post:
  - r1.ctx_offset=0
  - r1.type=ctx
  - r2.type=number
  - r2.svalue=[-32768, 32767]

---
# Sign-extending 32-bit load: svalue narrowed to [INT32_MIN, INT32_MAX].
# uvalue unconstrained for the same reason as the s8 case.
test-case: load s32 from ctx inline field narrows svalue to signed-word range

pre: ["r1.type=ctx", "r1.ctx_offset=0"]

code:
  <start>: |
    r2 = *(s32 *)(r1 + 8)

post:
  - r1.ctx_offset=0
  - r1.type=ctx
  - r2.type=number
  - r2.svalue=[-2147483648, 2147483647]
