---
# A relation carried through a loop must not destabilise the fixpoint. It is
# re-derived on every back-edge and holds on the entry edge, so it survives the
# loop-head join and analysis terminates. A regression in the meet/<= handling
# would time out here.
test-case: linear relation carried through a loop terminates

options: ["termination"]
pre: ["meta_offset=0",
      "r6.type=packet", "r6.packet_offset=[0, 200]", "r6.svalue=[4098, 2147418112]", "r6.uvalue=[4098, 2147418112]",
      "packet_size=[0, 65534]",
      "r4.type=number", "r4.svalue=[1, 100]", "r4.uvalue=[1, 100]"]

code:
  <start>: |
    r9 = 0
    r8 = r6
    r8 += r4
  <loop>: |
    if r9 >= 100 goto <out>
    r9 += 1
    r8 = r6
    r8 += r4
    goto <loop>
  <out>: |
    r0 = 0
    exit

