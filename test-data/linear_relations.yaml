# Negative: same as above but the length register is byte-swapped (`r4 = be64 r4`).
# The Un handler's singleton fast-path writes svalue/uvalue directly and returns
# early, bypassing havoc_offsets, so it requires its own top-of-handler
# invalidation. Without it the stale bound `r6.packet_offset + r4.svalue <=
# packet_size` (derived when r4 was 8) is wrongly reused and the out-of-bounds
# read is accepted.
