#
# Tests for the ptr-sum binding side-table (PtrSumBinding in type_to_num.hpp).
# The positive test exercises the substitution at a helper-call upper-bound
# check; the negatives exercise each invalidation path.

---
test-case: ptr-sum binding lets helper-call check pass for packet region

# r6's packet_offset is non-singleton, so the DBM cannot prove the
# helper-call upper bound from interval reasoning alone; the binding
# plus the assume on r3 carries it through.
pre: ["meta_offset=0",
      "r1.type=map_fd", "r1.map_fd=1",
      "r6.type=packet", "r6.packet_offset=[0, 200]", "r6.svalue=[4098, 2147418112]", "r6.uvalue=[4098, 2147418112]",
      "r7.type=packet", "r7.packet_offset=packet_size", "r7.packet_offset=[0, 65534]",
      "r7.svalue=[4098, 2147418112]", "r7.uvalue=[4098, 2147418112]",
      "packet_size=[0, 65534]",
      "r4.type=number", "r4.svalue=[1, 100]", "r4.uvalue=[1, 100]"]

code:
  <start>: |
    r8 = r6
    r8 += r4
    if r8 > r7 goto <out>
    r2 = r6
    r3 = r4
    call 130; bpf_ringbuf_output
  <out>: |
    r0 = 0

post:
  - meta_offset=0
  - packet_size=0
  - packet_size-r6.packet_offset<=65534
  - packet_size-r8.packet_offset<=65533
  - r0.svalue=0
  - r0.type=number
  - r0.uvalue=0
  - r6.packet_offset-packet_size<=200
  - r6.packet_offset-r8.packet_offset<=-1
  - r6.packet_offset=[0, 200]
  - r6.svalue=[4098, 2147418112]
  - r6.type=packet
  - r6.uvalue-r8.svalue<=-1
  - r6.uvalue=[4098, 2147418112]
  - r7.packet_offset=packet_size
  - r7.svalue=[4098, 2147418112]
  - r7.type=packet
  - r7.uvalue=[4098, 2147418112]
  - r8.packet_offset-packet_size<=300
  - r8.packet_offset-r6.packet_offset<=100
  - r8.packet_offset=[1, 300]
  - r8.svalue-r6.uvalue<=100
  - r8.svalue=[4099, 2147418212]
  - r8.type=packet
  - r8.uvalue=r8.svalue

# Stack and shared regions also use the mechanism, but realistic bytecode
# only exposes the 3-variable gap for the packet ceiling (the others are a
# compile-time constant or have no `end` register).

