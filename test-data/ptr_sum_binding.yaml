# A binding established identically on both arms survives the merge, even though
# the numeric join loses the 3-variable equality. On every concrete path r8 was
# computed as r6 + r4, so the substitution stays sound and the read is accepted.
test-case: ptr-sum binding survives a join and soundly carries the bound

pre: ["meta_offset=0",
      "r0.type=number", "r0.svalue=[0, 1]", "r0.uvalue=[0, 1]",
      "r1.type=map_fd", "r1.map_fd=1",
      "r6.type=packet", "r6.packet_offset=0", "r6.svalue=[4098, 2147418112]", "r6.uvalue=[4098, 2147418112]",
      "r7.type=packet", "r7.packet_offset=packet_size", "r7.packet_offset=[0, 65534]",
      "r7.svalue=[4098, 2147418112]", "r7.uvalue=[4098, 2147418112]",
      "packet_size=[0, 65534]",
      "r4.type=number", "r4.svalue=[0, 100]", "r4.uvalue=[0, 100]"]

code:
  <start>: |
    if r0 == 0 goto <arm2>
  <arm1>: |
    r4 = 10
    r8 = r6
    r8 += r4
    goto <merge>
  <arm2>: |
    r6 += 6
    r4 = 4
    r8 = r6
    r8 += r4
  <merge>: |
    if r8 > r7 goto <out>
    r2 = r6
    r3 = r4
    call 130; bpf_ringbuf_output
  <out>: |
    r0 = 0

