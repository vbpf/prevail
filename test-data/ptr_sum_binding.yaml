---
# A binding carried through a loop must not destabilise the fixpoint. It is
# re-derived on every back-edge and holds on the entry edge, so it survives the
# loop-head join and analysis terminates. A regression in the meet/<= handling
# would time out here.
test-case: ptr-sum binding carried through a loop terminates

options: ["termination"]
pre: ["meta_offset=0",
      "r6.type=packet", "r6.packet_offset=[0, 200]", "r6.svalue=[4098, 2147418112]", "r6.uvalue=[4098, 2147418112]",
      "packet_size=[0, 65534]",
      "r4.type=number", "r4.svalue=[1, 100]", "r4.uvalue=[1, 100]"]

code:
  <start>: |
    r9 = 0
    r8 = r6
    r8 += r4
  <loop>: |
    if r9 >= 100 goto <out>
    r9 += 1
    r8 = r6
    r8 += r4
    goto <loop>
  <out>: |
    r0 = 0
    exit

post:
  - meta_offset=0
  - pc[3]-r4.uvalue<=100
  - pc[3]-r6.svalue<=-3997
  - pc[3]-r6.uvalue<=-3997
  - pc[3]-r8.svalue<=-3998
  - pc[3]=101
  - pc[3]=r9.svalue+1
  - r0.svalue=0
  - r0.type=number
  - r0.uvalue=0
  - r4.svalue=[1, 100]
  - r4.type=number
  - r4.uvalue-r8.svalue<=-4098
  - r4.uvalue=[1, 100]
  - r6.packet_offset-r4.svalue<=199
  - r6.packet_offset=[0, 200]
