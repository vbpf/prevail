---
# T_SHARED also wires the substitution fallback, but unlike packet there is no
# `end` register to create the 3-variable gap, so the binding can never turn an
# unsafe shared access into a safe one. This negative confirms the wired shared
# path still rejects a genuinely out-of-bounds access (offset up to 300 into a
# 256-byte region) even with a binding live on r8.
test-case: ptr-sum binding does not weaken the shared-region bound check

pre: ["r1.type=map_fd", "r1.map_fd=1",
      "r2.type=shared", "r2.shared_offset=[0, 200]", "r2.shared_region_size=256",
      "r2.svalue=[1, 2147418112]", "r2.uvalue=[1, 2147418112]",
      "r4.type=number", "r4.svalue=[1, 100]", "r4.uvalue=[1, 100]"]

code:
  <start>: |
    r8 = r2
    r8 += r4
    r3 = r4
    call 130; bpf_ringbuf_output
  <out>: |
    r0 = 0

post:
  - "_|_"

messages:
  - "3: Upper bound must be at most r2.shared_region_size (valid_access(r2.offset, width=r3) for read)"
