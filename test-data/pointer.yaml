---
test-case: 32-bit pointer truncation - addition

pre:
  - "r1.ctx_offset=0"
  - "r1.svalue=[0, 4294967295]"
  - "r1.uvalue=r1.svalue"
  - "r1.type=ctx"
  - "r1.uvalue=[0, 4294967295]"

# Trigger 32-bit ALU operation without changing the value
code:
  <start>: |
    w1 += 0
    r2 = *(u32 *)(r1 + 0)

post:
  - "_|_"

messages:
  - "1: Invalid type (r1.type in {ctx, stack, packet, shared})"

